syntax = "proto3";

option java_package = "com.yashraj.datastoreinspector.sample.proto";
option java_multiple_files = true;

message UserPreferences {
  string username = 1;
  string email = 2;
  string number = 3;
  int32 age = 4;
  bool is_premium = 5;
  float rating = 6;
  int64 last_login = 7;
  double account_balance = 8;
}